apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-apolo
  namespace: apolo-apps
  labels:
    app: httpbin-apolo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin-apolo
  template:
    metadata:
      labels:
        app: httpbin-apolo
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-apolo
  namespace: apolo-apps
spec:
  selector:
    app: httpbin-apolo
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin-apolo-ingress
  namespace: apolo-apps
  annotations:
    # Exige que o cliente apresente um certificado
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    # Secret com a CA deve estar no mesmo namespace do Ingress
    nginx.ingress.kubernetes.io/auth-tls-secret: "apolo-apps/infisical-ca"
    # Profundidade da cadeia de certificados
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    # Injeta o certificado do cliente nos headers para a aplicacao
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: apolo.service.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: httpbin-apolo
                port:
                  number: 80
