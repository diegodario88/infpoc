apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-corebank
  namespace: corebank-apps
  labels:
    app: httpbin-corebank
  annotations:
    # Reloader observa estes Secrets; rolling restart sempre que:
    #  - corebank-client-tls-secret: rotacao do cert mTLS (PKI Subscriber)
    #  - corebank-app-env:           mudanca nos secrets de aplicacao (InfisicalSecret)
    secret.reloader.stakater.com/reload: "corebank-client-tls-secret,corebank-app-env"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin-corebank
  template:
    metadata:
      labels:
        app: httpbin-corebank
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: corebank-app-env
          volumeMounts:
            # Monta o certificado emitido pelo Infisical PKI
            - name: mtls-cert
              mountPath: /etc/certs
              readOnly: true
      volumes:
        - name: mtls-cert
          secret:
            secretName: corebank-client-tls-secret
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-corebank
  namespace: corebank-apps
spec:
  selector:
    app: httpbin-corebank
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
